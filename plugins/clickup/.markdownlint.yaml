# Markdownlint configuration
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
# Inspired by MADR (Markdown Architectural Decision Records)
# See https://github.com/adr/madr/blob/main/.markdownlint.yml

# Disable line length check
#
# Reason: We apply the one-sentence-per-line rule. A sentence may get longer
# than 80 characters, especially if it contains links or technical content.
# This is better for git diffs and code reviews.
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md013---line-length
MD013: false

# Allow duplicate headings
#
# Reason: Technical documentation often uses common section names like
# "Examples", "References", "Implementation", etc. across multiple documents.
# ADRs may also repeat titles (e.g., ADR-0001, ADR-0002).
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md024---multiple-headings-with-the-same-content
MD024: false

# Allow code blocks without blank lines
#
# Reason: Inline code blocks immediately after text are valid markdown.
# Not all code blocks require blank lines before them.
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md031---fenced-code-blocks-should-be-surrounded-by-blank-lines
MD031: false

# Allow flexible blank lines around lists
#
# Reason: Lists should be allowed immediately after headings or text
# without requiring blank lines before them.
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md030---blanks-around-lists
MD030: false
