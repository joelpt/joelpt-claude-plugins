<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0a09;
    --surface:   #131210;
    --surface2:  #1c1a17;
    --border:    #2a2720;
    --amber:     #c08040;
    --amber-dim: #7a5028;
    --text:      #e8e0d4;
    --text-dim:  #8a8070;
    --text-faint:#4a4438;
    --radius:    4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; background: var(--bg); color: var(--text); }

  body {
    font-family: 'Epilogue', system-ui, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1.5rem, 4vw, 3rem);
    height: 64px; display: flex; align-items: center; gap: 1.5rem;
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--amber); text-decoration: none; cursor: pointer; flex-shrink: 0;
  }

  .breadcrumb {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem; letter-spacing: 0.05em; color: var(--text-dim); overflow: hidden;
  }

  .breadcrumb-sep { color: var(--text-faint); }

  .breadcrumb-item {
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color 0.15s;
  }
  .breadcrumb-item:hover { color: var(--text); }
  .breadcrumb-item.current { color: var(--text); cursor: default; }

  main { padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 4vw, 3rem); max-width: 1400px; margin: 0 auto; }

  .index-hero { margin-bottom: 3rem; animation: fadeUp 0.6s ease both; }

  .index-hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; font-style: italic; line-height: 1.1;
  }

  .index-hero p { margin-top: 0.75rem; color: var(--text-dim); font-size: 0.88rem; letter-spacing: 0.04em; }

  .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5px; }

  .course-card {
    background: var(--surface); padding: 1.75rem 1.75rem 1.5rem;
    cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .course-card:hover { background: var(--surface2); }
  .course-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 2px; height: 0; background: var(--amber); transition: height 0.25s ease;
  }
  .course-card:hover::before { height: 100%; }

  .course-instructor { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); margin-bottom: 0.5rem; }
  .course-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 400; line-height: 1.3; margin-bottom: 1.25rem; }

  .progress-bar-wrap { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 0.6rem; }
  .progress-bar-fill { height: 100%; background: var(--amber); border-radius: 1px; }
  .progress-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.06em; }
  .progress-label .pct { color: var(--amber); font-weight: 500; }

  .course-header { margin-bottom: 3rem; animation: fadeUp 0.5s ease both; }
  .course-header .instructor-label { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--amber); margin-bottom: 0.6rem; }
  .course-header h1 { font-family: 'Fraunces', serif; font-size: clamp(1.75rem, 4vw, 3rem); font-weight: 300; font-style: italic; line-height: 1.1; }

  .course-stats { margin-top: 0.75rem; display: flex; align-items: center; gap: 1.5rem; font-size: 0.8rem; color: var(--text-dim); letter-spacing: 0.04em; }
  .course-stats .divider { color: var(--text-faint); }

  .categories { display: flex; flex-direction: column; gap: 2.5rem; }
  .category-section { animation: fadeUp 0.5s ease both; }
  .category-title { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .video-list { display: flex; flex-direction: column; gap: 1px; }

  .video-row {
    display: flex; align-items: center; gap: 1.25rem;
    padding: 0.875rem 1rem; background: var(--surface); cursor: pointer; transition: background 0.15s;
  }
  .video-row:hover { background: var(--surface2); }
  .video-row.not-downloaded { cursor: default; opacity: 0.45; }
  .video-row.not-downloaded:hover { background: var(--surface); }

  .video-index { font-family: 'Fraunces', serif; font-size: 0.8rem; font-weight: 300; color: var(--text-faint); min-width: 1.5rem; text-align: right; flex-shrink: 0; }
  .video-title { flex: 1; font-size: 0.88rem; }
  .video-status { flex-shrink: 0; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
  .video-status.done { color: var(--amber-dim); }

  .player-container { animation: fadeUp 0.4s ease both; }
  .player-meta { margin-bottom: 1.5rem; }
  .player-meta .cat-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 0.3rem; }
  .player-meta h2 { font-family: 'Fraunces', serif; font-size: clamp(1.2rem, 2.5vw, 1.75rem); font-weight: 300; font-style: italic; }
  .player-meta .index-label { margin-top: 0.3rem; font-size: 0.78rem; color: var(--text-dim); }

  .video-wrapper { width: 100%; background: #000; border-radius: var(--radius); overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6); margin-bottom: 1.5rem; }
  .video-wrapper video { display: block; width: 100%; max-height: 72vh; background: #000; }

  .player-nav { display: flex; gap: 1px; }
  .player-nav-btn {
    flex: 1; padding: 0.9rem 1.25rem; background: var(--surface); border: none;
    color: var(--text-dim); font-family: 'Epilogue', sans-serif; font-size: 0.8rem;
    letter-spacing: 0.05em; cursor: pointer; transition: background 0.15s, color 0.15s; text-align: left;
  }
  .player-nav-btn:last-child { text-align: right; }
  .player-nav-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
  .player-nav-btn:disabled { opacity: 0.25; cursor: default; }
  .player-nav-btn .nav-label { display: block; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); margin-bottom: 0.2rem; }

  .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 1rem; text-align: center; animation: fadeUp 0.4s ease both; }
  .state-center h2 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 300; font-style: italic; color: var(--text-dim); }
  .state-center p { font-size: 0.82rem; color: var(--text-faint); max-width: 28rem; line-height: 1.7; }
  .state-center code { font-family: 'Courier New', monospace; font-size: 0.75rem; background: var(--surface2); padding: 0.15em 0.4em; border-radius: 2px; color: var(--amber); }

  .stale-banner { background: color-mix(in srgb, var(--amber-dim) 15%, var(--surface)); border: 1px solid var(--amber-dim); border-radius: var(--radius); padding: 0.75rem 1rem; margin-bottom: 2rem; font-size: 0.8rem; color: var(--text-dim); letter-spacing: 0.03em; animation: fadeUp 0.4s ease both; }
  .stale-banner strong { color: var(--amber); font-weight: 500; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .courses-grid .course-card:nth-child(1)   { animation-delay: 0.02s; }
  .courses-grid .course-card:nth-child(2)   { animation-delay: 0.06s; }
  .courses-grid .course-card:nth-child(3)   { animation-delay: 0.10s; }
  .courses-grid .course-card:nth-child(4)   { animation-delay: 0.14s; }
  .courses-grid .course-card:nth-child(5)   { animation-delay: 0.18s; }
  .courses-grid .course-card:nth-child(6)   { animation-delay: 0.22s; }
  .courses-grid .course-card:nth-child(7)   { animation-delay: 0.26s; }
  .courses-grid .course-card:nth-child(8)   { animation-delay: 0.30s; }
  .courses-grid .course-card:nth-child(n+9) { animation-delay: 0.34s; }

  @media (max-width: 640px) {
    .courses-grid { grid-template-columns: 1fr; gap: 1px; }
    .video-row { padding: 0.75rem; }
    .player-nav { flex-direction: column; }
    .player-nav-btn:last-child { text-align: left; }
  }
  @media (min-width: 1024px) {
    .courses-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  }
</style>
</head>
<body>
<header>
  <span class="wordmark" id="home-link">Maestro Archive</span>
  <nav class="breadcrumb" id="breadcrumb"></nav>
</header>
<main id="app">
  <div class="state-center"><h2>Loading catalogue…</h2></div>
</main>

<script type="module">
  // ── Utilities ────────────────────────────────────────────────────────────────

  function t(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.textContent;
  }

  // Walk a category tree (v1 cat.videos or v2 cat.subcategories[].videos) and
  // yield every video. The server has already rewritten video.localPath to a
  // URL-relative path, so the SPA just reads it directly.
  function* walkVideos(categories) {
    if (!Array.isArray(categories)) return;
    for (const cat of categories) {
      if (Array.isArray(cat.videos)) for (const v of cat.videos) yield v;
      if (Array.isArray(cat.subcategories)) yield* walkVideos(cat.subcategories);
    }
  }

  function videoUrl(v) {
    return v.localPath ?? null;
  }

  function courseStats(course) {
    const all = [...walkVideos(course.categories)];
    const done = all.filter(v => v.completed).length;
    return { total: all.length, done };
  }

  function pct(done, total) { return total === 0 ? 0 : Math.round((done / total) * 100); }

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  // ── Routing ──────────────────────────────────────────────────────────────────

  function params() {
    const p = new URLSearchParams(location.search);
    return { course: p.get('course'), video: p.get('video') };
  }

  function nav(query) {
    history.pushState({}, '', query ? `?${new URLSearchParams(query)}` : '/');
    render();
  }

  window.addEventListener('popstate', () => render());
  document.getElementById('home-link').addEventListener('click', () => nav(null));

  // ── Breadcrumb ───────────────────────────────────────────────────────────────

  function renderBreadcrumb(parts) {
    const bc = document.getElementById('breadcrumb');
    bc.textContent = '';
    parts.forEach((p, i) => {
      if (i > 0) bc.appendChild(el('span', 'breadcrumb-sep', '›'));
      const span = el('span', `breadcrumb-item${i === parts.length - 1 ? ' current' : ''}`, p.label);
      if (i < parts.length - 1) {
        span.addEventListener('click', () => nav(p.query));
      }
      bc.appendChild(span);
    });
  }

  // ── DOM builders (no innerHTML for data content) ─────────────────────────────

  function buildProgressBar(done, total) {
    const p = pct(done, total);
    const wrap = el('div', 'progress-bar-wrap');
    const fill = el('div', 'progress-bar-fill');
    fill.style.width = `${p}%`;
    wrap.appendChild(fill);
    const label = el('div', 'progress-label');
    const pctSpan = el('span', 'pct', `${p}%`);
    label.appendChild(pctSpan);
    label.appendChild(document.createTextNode(` · ${done} of ${total} downloaded`));
    return { wrap, label };
  }

  function buildCourseCard(course) {
    const { done, total } = courseStats(course);
    const card = el('div', 'course-card');
    card.appendChild(el('div', 'course-instructor', course.instructor));
    card.appendChild(el('div', 'course-title', course.title));
    const { wrap, label } = buildProgressBar(done, total);
    card.appendChild(wrap);
    card.appendChild(label);
    card.addEventListener('click', () => nav({ course: course.slug }));
    return card;
  }

  function buildVideoRow(course, cat, v) {
    const url = videoUrl(v);
    const row = el('div', `video-row${v.completed ? '' : ' not-downloaded'}`);
    const idx = v.bbcMaestroIndex ?? v.index;
    row.appendChild(el('span', 'video-index', String(idx)));
    row.appendChild(el('span', 'video-title', v.title));
    const status = el('span', `video-status${v.completed ? ' done' : ''}`, v.completed ? 'Downloaded' : 'Not downloaded');
    row.appendChild(status);
    if (v.completed && url) {
      row.addEventListener('click', () => nav({ course: course.slug, video: url }));
    }
    return row;
  }

  // ── Views ────────────────────────────────────────────────────────────────────

  function renderIndex(data) {
    renderBreadcrumb([]);
    const app = document.getElementById('app');
    app.textContent = '';

    const stale = !data.lastFetched || (Date.now() - new Date(data.lastFetched).getTime()) > 30 * 24 * 60 * 60 * 1000;
    const fetchedStr = data.lastFetched
      ? new Date(data.lastFetched).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })
      : 'never';

    const hero = el('div', 'index-hero');
    const h1 = el('h1');
    h1.appendChild(document.createTextNode('Your Private'));
    h1.appendChild(document.createElement('br'));
    h1.appendChild(document.createTextNode('Maestro Archive'));
    hero.appendChild(h1);
    hero.appendChild(el('p', null, `${data.courses.length} course${data.courses.length !== 1 ? 's' : ''} · catalogue last updated ${fetchedStr}`));
    app.appendChild(hero);

    if (stale) {
      const banner = el('div', 'stale-banner');
      const strong = el('strong', null, 'Catalogue may be outdated. ');
      const code = el('code', null, '/fetch-list');
      banner.appendChild(strong);
      banner.appendChild(document.createTextNode('Run '));
      banner.appendChild(code);
      banner.appendChild(document.createTextNode(' to refresh.'));
      app.appendChild(banner);
    }

    const grid = el('div', 'courses-grid');
    data.courses.forEach(course => grid.appendChild(buildCourseCard(course)));
    app.appendChild(grid);
  }

  function renderCourse(data, slug) {
    const course = data.courses.find(c => c.slug === slug);
    if (!course) {
      renderBreadcrumb([{ label: 'Home', query: null }]);
      const app = document.getElementById('app');
      app.textContent = '';
      const center = el('div', 'state-center');
      center.appendChild(el('h2', null, 'Course not found'));
      const p = el('p');
      p.appendChild(document.createTextNode('No course with slug '));
      p.appendChild(el('code', null, slug));
      p.appendChild(document.createTextNode(' in the catalogue.'));
      center.appendChild(p);
      app.appendChild(center);
      return;
    }

    renderBreadcrumb([
      { label: 'Home', query: null },
      { label: course.title, query: { course: slug } },
    ]);

    const { done, total } = courseStats(course);
    const app = document.getElementById('app');
    app.textContent = '';

    const header = el('div', 'course-header');
    header.appendChild(el('div', 'instructor-label', course.instructor));
    header.appendChild(el('h1', null, course.title));
    const stats = el('div', 'course-stats');
    stats.appendChild(el('span', null, `${total} video${total !== 1 ? 's' : ''}`));
    stats.appendChild(el('span', 'divider', '·'));
    stats.appendChild(el('span', null, `${done} downloaded`));
    stats.appendChild(el('span', 'divider', '·'));
    stats.appendChild(el('span', null, `${pct(done, total)}% complete`));
    header.appendChild(stats);
    app.appendChild(header);

    const cats = el('div', 'categories');
    // Recursively render category/subcategory tree. Leaf categories show as
    // sections titled with their full hierarchy (e.g. "Vocal Exercises → Breathing Fundamentals").
    function renderCategoryTree(categoryList, parentTitle) {
      for (const cat of categoryList) {
        const fullTitle = parentTitle ? `${parentTitle} → ${cat.title}` : cat.title;
        if (Array.isArray(cat.videos) && cat.videos.length > 0) {
          const section = el('div', 'category-section');
          section.appendChild(el('div', 'category-title', fullTitle));
          const list = el('div', 'video-list');
          cat.videos.forEach(v => list.appendChild(buildVideoRow(course, { ...cat, title: fullTitle }, v)));
          section.appendChild(list);
          cats.appendChild(section);
        }
        if (Array.isArray(cat.subcategories) && cat.subcategories.length > 0) {
          renderCategoryTree(cat.subcategories, fullTitle);
        }
      }
    }
    renderCategoryTree(course.categories, null);
    app.appendChild(cats);
  }

  function renderVideo(data, slug, videoPath) {
    const course = data.courses.find(c => c.slug === slug);
    if (!course) {
      renderBreadcrumb([]);
      const app = document.getElementById('app');
      app.textContent = '';
      const center = el('div', 'state-center');
      center.appendChild(el('h2', null, 'Course not found'));
      app.appendChild(center);
      return;
    }

    let foundVideo = null, foundCat = null;
    const flatList = [];
    // Walk both v1 (cat.videos) and v2 (cat.subcategories[].videos) shapes.
    function flatten(cats, parentTitle) {
      if (!Array.isArray(cats)) return;
      for (const cat of cats) {
        const fullTitle = parentTitle ? `${parentTitle} → ${cat.title}` : cat.title;
        if (Array.isArray(cat.videos)) {
          for (const v of cat.videos) {
            if (v.completed) {
              const url = videoUrl(v);
              flatList.push({ v, cat: { ...cat, title: fullTitle }, url });
              if (url === videoPath) { foundVideo = v; foundCat = { ...cat, title: fullTitle }; }
            }
          }
        }
        if (Array.isArray(cat.subcategories)) flatten(cat.subcategories, fullTitle);
      }
    }
    flatten(course.categories, null);

    renderBreadcrumb([
      { label: 'Home', query: null },
      { label: course.title, query: { course: slug } },
      { label: foundVideo ? foundVideo.title : 'Video', query: { course: slug, video: videoPath } },
    ]);

    const app = document.getElementById('app');
    app.textContent = '';

    if (!foundVideo) {
      const center = el('div', 'state-center');
      center.appendChild(el('h2', null, 'Video not found'));
      center.appendChild(el('p', null, 'Could not locate the requested video in the catalogue.'));
      app.appendChild(center);
      return;
    }

    const idx = flatList.findIndex(e => e.url === videoPath);
    const prev = idx > 0 ? flatList[idx - 1] : null;
    const next = idx < flatList.length - 1 ? flatList[idx + 1] : null;

    const container = el('div', 'player-container');

    const meta = el('div', 'player-meta');
    meta.appendChild(el('div', 'cat-label', foundCat.title));
    meta.appendChild(el('h2', null, foundVideo.title));
    meta.appendChild(el('div', 'index-label', `Lesson ${foundVideo.bbcMaestroIndex ?? foundVideo.index} · ${course.instructor} — ${course.title}`));
    container.appendChild(meta);

    const wrapper = el('div', 'video-wrapper');
    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    video.src = videoPath;
    video.textContent = 'Your browser does not support HTML5 video.';
    wrapper.appendChild(video);
    container.appendChild(wrapper);

    const navBar = el('div', 'player-nav');

    const prevBtn = document.createElement('button');
    prevBtn.className = 'player-nav-btn';
    prevBtn.disabled = !prev;
    prevBtn.appendChild(el('span', 'nav-label', 'Previous'));
    prevBtn.appendChild(document.createTextNode(prev ? prev.v.title : '—'));
    if (prev) prevBtn.addEventListener('click', () => nav({ course: slug, video: prev.url }));
    navBar.appendChild(prevBtn);

    const nextBtn = document.createElement('button');
    nextBtn.className = 'player-nav-btn';
    nextBtn.disabled = !next;
    nextBtn.appendChild(el('span', 'nav-label', 'Next'));
    nextBtn.appendChild(document.createTextNode(next ? next.v.title : '—'));
    if (next) nextBtn.addEventListener('click', () => nav({ course: slug, video: next.url }));
    navBar.appendChild(nextBtn);

    container.appendChild(navBar);
    app.appendChild(container);
  }

  function renderEmpty() {
    renderBreadcrumb([]);
    const app = document.getElementById('app');
    app.textContent = '';
    const center = el('div', 'state-center');
    center.appendChild(el('h2', null, 'No catalogue yet'));
    const p = el('p');
    p.appendChild(document.createTextNode('Run '));
    p.appendChild(el('code', null, '/fetch-list'));
    p.appendChild(document.createTextNode(' inside Claude Code to build the course catalogue, then refresh this page.'));
    center.appendChild(p);
    app.appendChild(center);
  }

  function renderError(msg) {
    renderBreadcrumb([]);
    const app = document.getElementById('app');
    app.textContent = '';
    const center = el('div', 'state-center');
    center.appendChild(el('h2', null, 'Something went wrong'));
    center.appendChild(el('p', null, msg));
    app.appendChild(center);
  }

  // ── Main render loop ─────────────────────────────────────────────────────────

  let indexData = null;

  async function render() {
    if (!indexData) {
      try {
        const res = await fetch('/index.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        indexData = await res.json();
      } catch (err) {
        renderError(`Failed to load catalogue: ${err.message}`);
        return;
      }
    }

    if (!indexData.courses || indexData.courses.length === 0) { renderEmpty(); return; }

    const { course, video } = params();
    if (video && course) renderVideo(indexData, course, video);
    else if (course) renderCourse(indexData, course);
    else renderIndex(indexData);
  }

  render();
</script>
</body>
</html>
